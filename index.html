<!DOCTYPE html>
<html lang="de">
<head>
  <!-- ============================= -->
  <!-- BASIS -->
  <!-- ============================= -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>foempe.io</title>

  <meta name="description" content="foempe.io – minimal, modern, technology driven">
  <meta name="robots" content="index, follow">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- ============================= -->
  <!-- HAUPTBEREICH -->
  <!-- ============================= -->
  <!-- Logo zentriert, mit Fade-In -->
  <main class="center">

    <!-- ============================= -->
    <!-- LOGO (SVG) -->
    <!-- - automatisch Light / Dark -->
    <!-- - Fade-In beim Laden -->
    <!-- ============================= -->
    <picture class="fade-in">
      <!-- Dark Mode: weißes SVG -->
      <source
        srcset="assets/logo-white.svg"
        media="(prefers-color-scheme: dark)"
        type="image/svg+xml"
      >

      <!-- Light Mode / Fallback: schwarzes SVG -->
      <img
        src="assets/logo-black.svg"
        alt="LF – foempe.io"
        class="logo"
      >
    </picture>

  </main>

  <!-- ============================= -->
  <!-- FOOTER -->
  <!-- ============================= -->
  <footer>
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
  </footer>

</body>
</html>
